# Production/Docker Configuration
spring.application.name=ShopKart-Ecommerce-Platform

# MongoDB Configuration
# For Render: Set SPRING_DATA_MONGODB_URI environment variable
# For Docker: This will be overridden by docker-compose.yml
# Default: MongoDB Atlas (Cloud)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://ssdineshkarthick_db_user:Dinesh%402005@cluster0.eiqjysr.mongodb.net/ecommerce_store?retryWrites=true&w=majority&appName=Cluster0}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:ecommerce_store}

# MongoDB connection settings
spring.data.mongodb.connection-timeout=10000
spring.data.mongodb.socket-timeout=10000
spring.data.mongodb.auto-index-creation=true

# Server Configuration
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Logging Configuration
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Spring Boot Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mongodb.enabled=true

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Performance tuning
spring.jpa.open-in-view=false
spring.data.mongodb.repositories.type=auto

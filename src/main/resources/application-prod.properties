# Production/Docker Configuration
spring.application.name=ShopKart-Ecommerce-Platform

# MongoDB Configuration (Docker)
# This will be overridden by environment variables in docker-compose.yml
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://admin:admin123@mongodb:27017/coursedb?authSource=admin}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:coursedb}

# MongoDB connection settings
spring.data.mongodb.connection-timeout=10000
spring.data.mongodb.socket-timeout=10000
spring.data.mongodb.auto-index-creation=true

# Server Configuration
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Logging Configuration
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Spring Boot Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mongodb.enabled=true

# Security
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Performance tuning
spring.jpa.open-in-view=false
spring.data.mongodb.repositories.type=auto
